{% extends 'base.html' %}
{% block title %}Venda {{ nota.numero }}/{{ nota.serie }}{% endblock %}

{% block content %}
{% set cancelada = (nota.situacao == 'cancelada') %}
<div class="d-flex justify-content-between align-items-center mb-3" style="max-width:820px;margin:0 auto;">
  <a href="/vendas" onclick="if(document.referrer){history.back();return false;}"
     class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
  <span class="badge {{ 'bg-danger' if cancelada else 'bg-success' }}">
    {{ 'CANCELADA' if cancelada else nota.situacao }}
  </span>
</div>
{% include 'vendas/_detalhe_conteudo.html' %}
{% endblock %}
