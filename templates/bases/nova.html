{% extends "base.html" %}
{% block title %}Nova Base - {{ app_name }}{% endblock %}

{% block styles %}
<style>
  .page-hero {
    background: linear-gradient(135deg, #1D63A5 0%, #1a4f82 60%, #154070 100%);
    border-radius: .75rem; padding: 1.5rem 2rem; margin-bottom: 1.5rem; color: #fff;
  }
  .page-hero .hero-icon {
    width: 3rem; height: 3rem; background: rgba(255,255,255,.15); border-radius: .6rem;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0;
  }
  .form-section-title {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: #1D63A5; border-left: 3px solid #1D63A5; padding-left: 0.5rem; margin: 1rem 0 0.6rem;
  }
  .form-label { font-size: 0.83rem; font-weight: 600; color: #374151; }
  .form-control-sm, .form-select-sm { font-size: 0.84rem; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb small">
      <li class="breadcrumb-item"><a href="{{ url_for('index') }}" class="text-decoration-none">Dashboard</a></li>
      <li class="breadcrumb-item"><a href="{{ url_for('bases.lista') }}" class="text-decoration-none">Bases</a></li>
      <li class="breadcrumb-item active">Nova Base</li>
    </ol>
  </nav>

  <div class="page-hero d-flex align-items-center gap-3 flex-wrap">
    <div class="hero-icon"><i class="bi bi-plus-circle-fill"></i></div>
    <div class="flex-grow-1">
      <h4 class="mb-0 fw-bold">Nova Base</h4>
      <p class="mb-0 opacity-75 small">Cadastre uma nova base operacional no sistema.</p>
    </div>
    <a href="{{ url_for('bases.lista') }}"
       class="btn btn-sm px-3" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);">
      <i class="bi bi-arrow-left me-1"></i> Voltar
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-header d-flex align-items-center py-2"
         style="background:#1D63A5;color:white;font-size:0.82rem;font-weight:600;letter-spacing:0.02em;">
      <i class="bi bi-geo-alt-fill me-2"></i> Dados da Base
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-section-title"><i class="bi bi-info-circle me-1"></i>Dados Principais</div>
        <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label">Nome da Base <span class="text-danger">*</span></label>
            <input type="text" name="nome" class="form-control form-control-sm" required>
          </div>
          <div class="col-md-6 mb-2">
            <label class="form-label">Cidade</label>
            <input type="text" name="cidade" class="form-control form-control-sm">
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mb-2">
            <label class="form-label">Observação</label>
            <input type="text" name="observacao" class="form-control form-control-sm"
                   placeholder="Informação para o motorista (ponto de referência, acesso, etc.)">
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mb-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
              <label class="form-check-label" for="ativo" style="font-size:0.83rem;font-weight:600;color:#374151;">
                Base ativa
              </label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4 pt-2 border-top">
          <a href="{{ url_for('bases.lista') }}" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Voltar
          </a>
          <button type="submit" class="btn btn-primary btn-sm px-4">
            <i class="bi bi-check-circle me-1"></i> Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
