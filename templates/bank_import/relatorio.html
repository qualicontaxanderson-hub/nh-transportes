<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Report</title>
</head>
<body>
    <h1>Supplier Report</h1>
    <p><strong>Date:</strong> 2026-02-20</p>
    <table border="1">
        <thead>
            <tr>
                <th>Supplier</th>
                <th>Total Paid</th>
                <th>Total Purchased</th>
                <th>Reconciliation Balance</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Example Supplier 1</td>
                <td>$1000</td>
                <td>$1200</td>
                <td>$-200</td>
            </tr>
            <tr>
                <td>Example Supplier 2</td>
                <td>$2000</td>
                <td>$2000</td>
                <td>$0</td>
            </tr>
            <!-- Additional suppliers can be added here -->
        </tbody>
    </table>
</body>
</html>
