<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Import</title>
</head>
<body>
    <h1>Upload OFX File</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="bankAccount">Select Bank Account:</label>
        <select id="bankAccount" name="bankAccount" required>
            <option value="account1">Account 1</option>
            <option value="account2">Account 2</option>
            <option value="account3">Account 3</option>
        </select>
        <br><br>
        <label for="ofxFile">Choose OFX file:</label>
        <input type="file" id="ofxFile" name="ofxFile" accept="application/octet-stream" required>
        <br><br>
        <input type="submit" value="Upload">
    </form>
</body>
</html>
