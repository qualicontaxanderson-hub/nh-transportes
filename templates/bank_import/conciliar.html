<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Transaction Conciliation</title>
</head>
<body>
    <h1>Pending Bank Transactions</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Transaction ID</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Select Supplier</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be populated with pending transactions -->
            <tr>
                <td>1</td>
                <td>2026-02-18</td>
                <td>100.00</td>
                <td>Pending</td>
                <td>
                    <select>
                        <option value="">Select Supplier</option>
                        <option value="supplier1">Supplier 1</option>
                        <option value="supplier2">Supplier 2</option>
                        <option value="supplier3">Supplier 3</option>
                    </select>
                </td>
            </tr>
            <!-- Add more rows as necessary -->
        </tbody>
    </table>
</body>
</html>
